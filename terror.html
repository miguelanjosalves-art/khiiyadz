<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NÃO CLIQUE</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Olhos iniciais */
        .eye {
            width: 140px;
            height: 80px;
            background: radial-gradient(circle at center, #666 0%, #333 30%, transparent 60%);
            border-radius: 60% 40% 60% 40% / 70% 30% 70% 30%;
            filter: blur(2px);
            position: relative;
        }

        .pupil {
            width: 45px;
            height: 45px;
            background-color: #000;
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1s;
        }

        .msg {
            font-size: 24px;
            opacity: 0;
            transition: opacity 1.5s;
            letter-spacing: 5px;
            position: absolute;
            bottom: 20%;
            text-align: center;
            color: #444;
        }

        #text2 { color: #8b0000; font-weight: bold; }

        /* --- O JUMPSCARE --- */
        #jumpscare-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Usando o nome da imagem enviada */
            background-image: url('https://i.pinimg.com/736x/ef/6d/44/ef6d44dd25f0570371492461aeb8216b.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 9999;
            display: none;
        }

        #click-trigger {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 998;
            display: none;
            cursor: pointer;
        }

        /* Área do Som Escondida */
        #video-container { 
            position: absolute; 
            width: 1px; 
            height: 1px; 
            opacity: 0.01; 
            left: -10px; 
        }

        .pupil-point { width: 8px !important; height: 8px !important; }
        .face-vibrate { animation: shake 0.1s linear infinite; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <div id="scary-face">
        <div style="display:flex; gap:120px;">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
        </div>
    </div>

    <div id="text1" class="msg">mark... vamos te caçar...</div>
    <div id="text2" class="msg">caçar ate sua morte...</div>

    <div id="click-trigger"></div>
    <div id="jumpscare-overlay"></div>
    <div id="video-container"></div>

    <script>
        const face = document.getElementById('scary-face');
        const pupils = document.querySelectorAll('.pupil');
        const t1 = document.getElementById('text1');
        const t2 = document.getElementById('text2');
        const trigger = document.getElementById('click-trigger');
        const overlay = document.getElementById('jumpscare-overlay');
        const video = document.getElementById('video-container');

        // 10s: Texto 1
        setTimeout(() => { t1.style.opacity = '1'; }, 10000);

        // 20s: Texto 2 + Olhos
        setTimeout(() => {
            t1.style.opacity = '0';
            setTimeout(() => {
                t2.style.opacity = '1';
                face.classList.add('face-vibrate');
                pupils.forEach(p => p.classList.add('pupil-point'));
            }, 1000);
        }, 20000);

        // 30s: Texto some
        setTimeout(() => {
            t2.style.opacity = '0';
            // 32s: Libera o clique mortal
            setTimeout(() => { trigger.style.display = 'block'; }, 2000);
        }, 30000);

        // O SUSTO (Ao clicar)
        trigger.addEventListener('click', () => {
            overlay.style.display = 'block';
            
            // NOVO LINK COM COMANDOS DE AUTOPLAY FORÇADO
            // O link xLIMTrlm2bE agora tem parâmetros para ignorar bloqueios
            video.innerHTML = `<iframe width="560" height="315" src="https://www.youtube.com/embed/xLIMTrlm2bE?autoplay=1&mute=0&controls=0&showinfo=0&rel=0&enablejsapi=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>`;

            setTimeout(() => {
                overlay.style.display = 'none';
                video.innerHTML = ''; // Para o som
                document.body.innerHTML = '<h1 style="color:white; text-align:center; margin-top:45vh;">ESTÁ ATRÁS DE VOCÊ.</h1>';
            }, 3000);
        });
    </script>
</body>
</html>
