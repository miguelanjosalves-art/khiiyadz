<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eles Estão Vendo</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .eyes-container {
            display: flex;
            gap: 120px;
            position: relative;
            margin-bottom: 50px;
            /* Esta propriedade é crucial para que a tremidinha (transform) não quebre o layout */
            will-change: transform; 
        }

        /* --- Estilo Base dos Olhos --- */
        .eye {
            width: 140px;
            height: 80px;
            position: relative;
            background-color: #000;
            border-radius: 50%;
            overflow: hidden;
            filter: blur(2px);
        }

        .eye::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #666 0%, #333 30%, transparent 60%);
            border-radius: 60% 40% 60% 40% / 70% 30% 70% 30%;
            opacity: 0.7;
            animation: cloudShift 6s ease-in-out infinite alternate;
        }

        /* --- Estilo da Pupila ( começa redonda ) --- */
        .pupil {
            width: 50px;
            height: 50px;
            background-color: #000;
            border-radius: 50%; /* Pupila redonda padrão */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* Centraliza */
            filter: blur(1px);
            transition: border-radius 1s ease-in-out, width 1s ease-in-out, height 1s ease-in-out;
            z-index: 10;
        }

        /* --- Texto 1 --- */
        #warning-text1 {
            color: #444; /* Cinza escura */
            font-size: 24px;
            opacity: 0;
            transition: opacity 2s;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            letter-spacing: 5px;
            position: absolute; /* Para que o texto 2 apareça exatamente no mesmo lugar */
            bottom: 20%;
        }

        /* --- Texto 2 --- */
        #warning-text2 {
            color: #8b0000; /* Vermelho Sangue Escuro */
            font-size: 28px; /* Ligeiramente maior para impacto */
            opacity: 0;
            transition: opacity 1s; /* Transição mais rápida */
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
            letter-spacing: 7px;
            font-weight: bold;
            position: absolute;
            bottom: 20%;
        }

        /* =========================================
           ANIMAÇÕES (Keyframes)
           ========================================= */

        /* 1. Animação de Névoa do Olho (Nó já tínhamos) */
        @keyframes cloudShift {
            0% { border-radius: 60% 40% 60% 40% / 70% 30% 70% 30%; }
            100% { border-radius: 40% 60% 40% 60% / 30% 70% 30% 70%; }
        }

        /* 2. NOVA ANIMAÇÃO: Tremor dos Olhos (Eye Shake) */
        @keyframes eyeShake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-3px, 3px); }
            20% { transform: translate(3px, -3px); }
            30% { transform: translate(-3px, -3px); }
            40% { transform: translate(3px, 3px); }
            50% { transform: translate(-3px, 3px); }
            60% { transform: translate(3px, -3px); }
            70% { transform: translate(-3px, -3px); }
            80% { transform: translate(3px, 3px); }
            90% { transform: translate(-3px, 3px); }
            100% { transform: translate(0, 0); }
        }

        /* =========================================
           CLASSES DE EFEITO (Ativadas pelo JS)
           ========================================= */

        /* Classe que faz o container de olhos tremer */
        .eyes-vibrate {
            animation: eyeShake 0.15s linear infinite; /* Tremor muito rápido */
        }

        /* Classe que faz a pupila ficar fina (estilo réptil/fenda) */
        .pupil-narrow {
            width: 15px; /* Estreita */
            height: 60px; /* Longa */
            border-radius: 10px 10px 10px 10px; /* Formato de fenda vertical */
        }

    </style>
</head>
<body>

    <div id="eyes-container" class="eyes-container">
        <div class="eye left"><div class="pupil"></div></div>
        <div class="eye right"><div class="pupil"></div></div>
    </div>

    <div id="warning-text1">mark... vamos te caçar...</div>
    <div id="warning-text2">caçar ate sua morte...</div>

    <script>
        // Seleciona os elementos que vamos manipular
        const container = document.getElementById('eyes-container');
        const pupils = document.querySelectorAll('.pupil');
        const text1 = document.getElementById('warning-text1');
        const text2 = document.getElementById('warning-text2');

        // --- LINHA DO TEMPO DO TERROR ---

        // Fase 1: Início
        // Espera 10 segundos e mostra o Texto 1
        setTimeout(() => {
            text1.style.opacity = '1';
        }, 10000); 

        // Fase 2: A Mudança
        // Espera mais 10 segundos (total 20s)
        setTimeout(() => {
            // A. Esconde o Texto 1
            text1.style.opacity = '0';

            // B. Mostra o Texto 2 (com um pequeno atraso de 1s para o texto 1 sumir)
            setTimeout(() => {
                text2.style.opacity = '1';

                // C. ATIVA OS EFEITOS DE TERROR NOS OLHOS
                container.classList.add('eyes-vibrate'); // Adiciona o tremor
                pupils.forEach(pupil => pupil.classList.add('pupil-narrow')); // Estreita a pupila
            }, 1000);

        }, 20000); // 10s (fase 1) + 10s (texto 1)

        // Fase 3: O Fim
        // Espera mais 10 segundos para o Texto 2 (total 31s, considerando os atrasos)
        setTimeout(() => {
            // A. Esconde o Texto 2
            text2.style.opacity = '0';

            // B. DESATIVA OS EFEITOS (Olhos voltam ao normal)
            container.classList.remove('eyes-vibrate');
            pupils.forEach(pupil => pupil.classList.remove('pupil-narrow'));

        }, 31000);

    </script>

</body>
</html>
