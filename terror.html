<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NÃO CLIQUE</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Container dos Olhos */
        #scary-face {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .eyes-container {
            display: flex;
            gap: 120px;
        }

        .eye {
            width: 140px;
            height: 80px;
            background: radial-gradient(circle at center, #666 0%, #333 30%, transparent 60%);
            border-radius: 60% 40% 60% 40% / 70% 30% 70% 30%;
            filter: blur(2px);
            position: relative;
        }

        .pupil {
            width: 45px;
            height: 45px;
            background-color: #000;
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1s;
        }

        /* Mensagens de Texto */
        .msg {
            font-size: 24px;
            opacity: 0;
            transition: opacity 1.5s;
            letter-spacing: 5px;
            position: absolute;
            bottom: 20%;
            text-align: center;
            color: #444;
        }

        #text2 { color: #8b0000; font-weight: bold; }

        /* Gatilho de Clique (Invisível) */
        #click-trigger {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 999;
            display: none;
            cursor: pointer;
        }

        /* O JUMPSCARE (Tela Inteira) */
        #jumpscare-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('https://i.pinimg.com/736x/ef/6d/44/ef6d44dd25f0570371492461aeb8216b.jpg'); /* NOME DA SUA IMAGEM AQUI */
            background-size: cover;
            background-position: center;
            z-index: 9999;
            display: none;
        }

        /* Esconder o Player do YouTube completamente */
        #video-container {
            position: absolute;
            left: -9999px; /* Joga o vídeo para longe da tela */
            top: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        /* Efeitos de Animação */
        .pupil-point { width: 8px !important; height: 8px !important; }
        .face-vibrate { animation: shake 0.1s linear infinite; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <div id="scary-face">
        <div class="eyes-container">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
        </div>
    </div>

    <div id="text1" class="msg">mark... vamos te caçar...</div>
    <div id="text2" class="msg">caçar ate sua morte...</div>

    <div id="click-trigger"></div>
    <div id="jumpscare-overlay"></div>
    <div id="video-container"></div>

    <script>
        const face = document.getElementById('scary-face');
        const pupils = document.querySelectorAll('.pupil');
        const t1 = document.getElementById('text1');
        const t2 = document.getElementById('text2');
        const trigger = document.getElementById('click-trigger');
        const overlay = document.getElementById('jumpscare-overlay');
        const video = document.getElementById('video-container');

        // Sequência de tempo
        setTimeout(() => { t1.style.opacity = '1'; }, 10000);

        setTimeout(() => {
            t1.style.opacity = '0';
            setTimeout(() => {
                t2.style.opacity = '1';
                face.classList.add('face-vibrate');
                pupils.forEach(p => p.classList.add('pupil-point'));
            }, 1000);
        }, 20000);

        setTimeout(() => {
            t2.style.opacity = '0';
            // Libera o clique 2 segundos após o texto sumir
            setTimeout(() => {
                trigger.style.display = 'block';
            }, 2000);
        }, 30000);

        // O SUSTO AO CLICAR
        trigger.addEventListener('click', () => {
            overlay.style.display = 'block';
            
            // Link do som do YT escondido (Grito Agudo)
            // Usamos autoplay=1 e mute=0
            video.innerHTML = `<iframe src="https://www.youtube.com/shorts/89jnunx5p_A?feature=share?autoplay=1&mute=0" allow="autoplay"></iframe>`;

            // Mantém por 3 segundos
            setTimeout(() => {
                overlay.style.display = 'none';
                video.innerHTML = ''; // Para o som
                document.body.innerHTML = '<h1 style="color:white; text-align:center; margin-top:45vh;">MARCADO.</h1>';
            }, 3000);
        });
    </script>
</body>
</html>
