<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>O Encarar</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .scary-face-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            will-change: transform; 
        }

        .eyes-container {
            display: flex;
            gap: 120px;
            position: relative;
            margin-bottom: 50px;
        }

        .eye {
            width: 140px;
            height: 80px;
            position: relative;
            background-color: #000;
            border-radius: 50%;
            overflow: hidden;
            filter: blur(2px);
        }

        .eye::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #666 0%, #333 30%, transparent 60%);
            border-radius: 60% 40% 60% 40% / 70% 30% 70% 30%;
            opacity: 0.7;
            animation: cloudShift 6s ease-in-out infinite alternate;
        }

        .pupil {
            width: 45px; 
            height: 45px;
            background-color: #000;
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(1px);
            transition: width 1s ease-in-out, height 1s ease-in-out;
            z-index: 10;
        }

        /* --- CONFIGURAÇÃO DA IMAGEM DO SORRISO --- */
        .mouth-smile {
            width: 400px; 
            height: 200px;
            position: absolute;
            bottom: -180px;
            
            /* AQUI ESTÁ O SEGREDO: O nome do arquivo tem que ser igual ao que você salvou */
            background-image: url('sorriso.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            
            opacity: 0;
            transform: scaleY(0.1);
            transition: opacity 2s, transform 1.5s ease-out;
            z-index: 5;
        }

        .msg {
            font-size: 24px;
            opacity: 0;
            transition: opacity 1.5s;
            letter-spacing: 5px;
            position: absolute;
            bottom: 15%;
            text-align: center;
            width: 100%;
        }

        #text1 { color: #444; text-shadow: 0 0 10px rgba(255, 0, 0, 0.3); }
        #text2 { color: #8b0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.8); font-weight: bold; }

        /* Classes de ativação */
        .pupil-point { width: 10px !important; height: 10px !important; }
        .face-vibrate { animation: faceShake 0.12s linear infinite; }
        .mouth-reveal { opacity: 1 !important; transform: scaleY(1) !important; }

        @keyframes faceShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, 2px); }
        }

        @keyframes cloudShift {
            0% { border-radius: 60% 40% 60% 40% / 70% 30% 70% 30%; }
            100% { border-radius: 40% 60% 40% 60% / 30% 70% 30% 70%; }
        }
    </style>
</head>
<body>

    <div id="scary-face" class="scary-face-container">
        <div id="eyes-box" class="eyes-container">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
        </div>
        <div id="mouth" class="mouth-smile"></div>
    </div>

    <div id="text1" class="msg">mark... vamos te caçar...</div>
    <div id="text2" class="msg">caçar ate sua morte...</div>

    <script>
        const scaryFace = document.getElementById('scary-face');
        const pupils = document.querySelectorAll('.pupil');
        const t1 = document.getElementById('text1');
        const t2 = document.getElementById('text2');
        const mouth = document.getElementById('mouth');

        // Cronômetro
        setTimeout(() => { t1.style.opacity = '1'; }, 10000);

        setTimeout(() => {
            t1.style.opacity = '0';
            setTimeout(() => {
                t2.style.opacity = '1';
                pupils.forEach(p => p.classList.add('pupil-point'));
                scaryFace.classList.add('face-vibrate');
            }, 1000);
        }, 20000);

        setTimeout(() => { t2.style.opacity = '0'; }, 30000);

        // Revelação do Sorriso (33 segundos)
        setTimeout(() => {
            mouth.classList.add('mouth-reveal');
        }, 33000);

    </script>
</body>
</html>
