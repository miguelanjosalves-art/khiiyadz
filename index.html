<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Terror Assombroso</title>
    <style>
        body {
            background-color: #000; /* Fundo totalmente preto */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }

        .eyes-container {
            display: flex;
            gap: 120px; /* Distância entre os olhos */
            position: relative;
        }

        /* Estilo base para ambos os olhos */
        .eye {
            width: 140px; /* Ligeiramente maior para impacto */
            height: 80px;
            position: relative;
            background-color: #000;
            border-radius: 50%;
            overflow: hidden;
            filter: blur(2px); /* Desfoque suave nas bordas externas */
        }

        /* O formato orgânico e enevoado do olho */
        .eye::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Radial gradient para criar o fundo branco-acinzentado enevoado */
            background: radial-gradient(circle at center, #666 0%, #333 30%, transparent 60%);
            /* Máscara para criar bordas irregulares (importante!) */
            border-radius: 60% 40% 60% 40% / 70% 30% 70% 30%;
            opacity: 0.7; /* Semi-transparente */
            animation: cloudShift 6s ease-in-out infinite alternate;
        }

        /* O "bueiro" (abertura) do olho, preto e irregular */
        .pupil {
            width: 50px;
            height: 50px;
            background-color: #000;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(1px); /* Pupila também ligeiramente borrada */
            z-index: 10;
        }

        /* Detalhe sutil de borda irregular na pupila */
        .pupil::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 5px #000;
            opacity: 0.9;
        }

        /* Olho esquerdo ligeiramente diferente (como na imagem) */
        .eye.left {
            transform: scaleX(1.05); /* Ligeiramente mais largo */
        }

        /* Olho direito ligeiramente diferente (como na imagem) */
        .eye.right {
            transform: scaleX(0.95); /* Ligeiramente mais estreito */
        }

        /* Animação para fazer o efeito de névoa mudar ligeiramente */
        @keyframes cloudShift {
            0% {
                border-radius: 60% 40% 60% 40% / 70% 30% 70% 30%;
                opacity: 0.7;
            }
            100% {
                border-radius: 40% 60% 40% 60% / 30% 70% 30% 70%;
                opacity: 0.8;
            }
        }

    </style>
</head>
<body>

    <div class="eyes-container">
        <div class="eye left"><div class="pupil"></div></div>
        <div class="eye right"><div class="pupil"></div></div>
    </div>

</body>
</html>
